<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ramadan Special 🌙</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #1a2a6c, #b21f1f, #fdbb2d, #00c9ff);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    pointer-events: none;
}

/* Stars background */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    box-shadow: 0 0 6px white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* Card */
.card {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
    animation: fadeIn 2s ease;

}

h1 {
    font-size: 42px;
}

.moon {
    font-size: 70px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 40px gold; }
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
    font-size: 16px;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}
.mosque {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 160px;
    background: url('https://pngimg.com/uploads/mosque/mosque_PNG28.png') no-repeat center bottom;
    background-size: contain;
    opacity: 0.5;
    transform: scale(1);
    transition: transform 0.5s ease;
}
.big-moon {
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, #fff, #ffd700);
    border-radius: 50%;
    filter: blur(20px);
    opacity: 0.6;
}
.floating-text {
    position: absolute;
    font-size: 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s ease, transform 3s linear;
    pointer-events: none;
}
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<!-- Stars -->
<script>
for (let i = 0; i < 150; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    star.style.opacity = Math.random();
    star.style.transform = "scale(" + Math.random() + ")";
    document.body.appendChild(star);
}
</script>

<div class="card">
   <div class="big-moon"></div>
    <h1>Ramadan Mubarak</h1>
    <p>May your duas be accepted 🤲<br>Peace, blessings & happiness ✨</p>
    
    <button onclick="startExperience()">Open Special Wish 🎁</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2>✨ Special Message ✨</h2>
        <p>Ranjith wishes you a beautiful Ramadan 🌙<br>
        May Allah bless you with success & peace 🤲</p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<!-- Music -->
<audio id="music" loop>
    <source src="RaaHa117.mp3" type="audio/mpeg">
</audio>
<script>
document.body.addEventListener("click", function() {
    let music = document.getElementById("music");
    music.play().then(() => {
        console.log("Music started");
    }).catch((error) => {
        console.log("Error playing:", error);
    });
}, { once: true });
</script>
<script>
function startExperience() {

    // 🎶 Play Music
    let music = document.getElementById("music");
    music.play();

    let messages = [
        "To show mercy to every living creature created",
        "Not to judge or not to be envious",
        "Not to repay evil with evil",
        "To be grateful and rely on God",
        "To be able to stand up to injustice",
        "Not to Break hearts and not to incur anyone's curse",
        "To Stand Strong against adversity and keep one's \"humanity\" ",
        "To be able to forgive",
        "To be able to stay pure-hearted no matter What"
     
    ];

  let mosque = document.getElementById("mosque");

// Animate mosque repeatedly with music feel
setInterval(() => {
    mosque.style.transform = "scale(1.1)";
    setTimeout(() => {
        mosque.style.transform = "scale(1)";
    }, 300);
}, 600);
    let index = 0;

    function showMessage() {
        if (index >= messages.length) {
            document.getElementById("popup").style.display = "flex";
            return;
        }

        let msg = document.createElement("div");
        msg.className = "floating-text";
        msg.innerText = messages[index];
         
      

        // 🎯 Random position
        msg.style.top = Math.random() * 80 + "vh";
        msg.style.left = Math.random() * 80 + "vw";

        msg.style.fontSize = (16 + Math.random() * 20) + "px"
        msg.style.textShadow = "0 0 10px " + msg.style.color;

        // 🎨 Random color
        let colors = [ "#FFD700", "#00FFFF", "#FF69B4", "#ADFF2F", "#FFA500", "#FFFFFF", "#00FF7F", 
         "#FF4500","#1E90FF", "#FF1493"];
        msg.style.color = colors[Math.floor(Math.random() * colors.length)];

        document.body.appendChild(msg);

        // Fade in
        setTimeout(() => {
    msg.style.opacity = 1;
    msg.style.transform = "translateY(-50px)";
}, 100);

        // Fade out + remove
        setTimeout(() => {
            msg.style.opacity = 0;
            setTimeout(() => {
                msg.remove();
            }, 1000);
        }, 3000);

        index++;
        setTimeout(showMessage, 1500);
    }

    showMessage();
}
</script>
<div class="mosque" id="mosque"></div>
</body>
</html>
