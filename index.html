<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Special 🌙</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #1a2a6c, #b21f1f, #fdbb2d, #00c9ff);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    pointer-events: none;
}

/* Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    box-shadow: 0 0 6px white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* Card */
.card {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
    padding: 20px;
    width: 90%;
    max-width: 350px;
    margin: auto;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

h1 { font-size: 28px; }
p { font-size: 14px; }

button {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
    font-size: 14px;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #111;
    padding: 30px;
    border-radius: 15px;
}

/* Mosque */
.mosque {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100px;
    background: url('https://pngimg.com/uploads/mosque/mosque_PNG28.png') no-repeat center bottom;
    background-size: contain;
    opacity: 0.5;
    transform: scale(1);
    transition: transform 0.5s ease;
}

/* Floating text */
.floating-text {
    position: absolute;
    opacity: 0;
    max-width: 80%;
    text-align: center;
    transform: translateY(20px);
    transition: opacity 1s ease, transform 3s linear;
    pointer-events: none;
}

/* Mobile */
@media (max-width: 600px) {
    h1 { font-size: 24px; }
    p { font-size: 13px; }
    button { font-size: 13px; padding: 8px 15px; }
    .floating-text { font-size: 14px; }
}
</style>
</head>

<body>

<script>
// Stars (mobile optimized)
let starCount = window.innerWidth < 600 ? 80 : 150;

for (let i = 0; i < starCount; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    star.style.opacity = Math.random();
    star.style.transform = "scale(" + Math.random() + ")";
    document.body.appendChild(star);
}
</script>

<div class="card">
    <h1>Ramadan Mubarak 🌙</h1>
    <p>May your duas be accepted 🤲<br>Peace, blessings & happiness ✨</p>
    <button onclick="startExperience()">Open Special Wish 🎁</button>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2>✨ Special Message ✨</h2>
        <p>Ranjith wishes you a beautiful Ramadan 🌙<br>
        May Allah bless you 🤲</p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<div class="mosque" id="mosque"></div>

<audio id="music" loop>
    <source src="RaaHa117.mp3" type="audio/mpeg">
</audio>

<script>
function startExperience() {

    let music = document.getElementById("music");
    music.play();

    // mobile vibration
    if (navigator.vibrate) navigator.vibrate(100);

    // mosque animation (run once)
    if (!window.mosqueRunning) {
        window.mosqueRunning = true;
        let mosque = document.getElementById("mosque");

        setInterval(() => {
            mosque.style.transform = "scale(1.1)";
            setTimeout(() => {
                mosque.style.transform = "scale(1)";
            }, 300);
        }, 700);
    }

    let messages = [
        "To show mercy to every living creature",
        "Not to judge or be envious",
        "Not to repay evil with evil",
        "To be grateful and rely on God",
        "To stand up to injustice",
        "Not to break hearts",
        "Stay strong & keep humanity",
        "To forgive and stay pure-hearted",
        "Ramadan Mubarak 🌙"
    ];

    let index = 0;

    function showMessage() {
        if (index >= messages.length) {
            document.getElementById("popup").style.display = "flex";
            return;
        }

        let msg = document.createElement("div");
        msg.className = "floating-text";
        msg.innerText = messages[index];

        msg.style.top = (10 + Math.random() * 70) + "vh";
        msg.style.left = (10 + Math.random() * 70) + "vw";

        msg.style.fontSize = (16 + Math.random() * 20) + "px";

        let colors = ["#FFD700","#00FFFF","#FF69B4","#ADFF2F","#FFA500","#FFFFFF","#00FF7F","#FF4500","#1E90FF","#FF1493"];
        let color = colors[Math.floor(Math.random() * colors.length)];
        msg.style.color = color;
        msg.style.textShadow = "0 0 10px " + color;

        document.body.appendChild(msg);

        setTimeout(() => {
            msg.style.opacity = 1;
            msg.style.transform = "translateY(-50px)";
        }, 100);

        setTimeout(() => {
            msg.style.opacity = 0;
            setTimeout(() => msg.remove(), 1000);
        }, 3000);

        index++;
        setTimeout(showMessage, 1500);
    }

    showMessage();
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
